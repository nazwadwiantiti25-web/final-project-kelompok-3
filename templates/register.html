<!DOCTYPE html>
<html>

<head>
<title>Registrasi</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>REGISTRASI MAHASISWA</h1>

<form method="POST">

NIM:
<input type="text" name="nim">
<br><br>

Nama:
<input type="text" name="nama">
<br><br>

Password:
<input type="password" name="password">
<br><br>

IPK:
<input type="number" step="0.01" name="ipk">
<br><br>

Penghasilan Orang Tua:
<input type="number" name="penghasilan">
<br><br>

Jumlah Tanggungan:
<input type="number" name="tanggungan">
<br><br>

<button type="submit">
Daftar
</button>

</form>

</body>

</html>
